<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiries | Scorpion Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-white text-gray-900 flex h-screen overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-20 hidden transition-opacity duration-300 opacity-0 md:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-[260px] bg-[#171717] text-gray-300 flex flex-col justify-between transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="p-4">
            <div class="flex items-center justify-between mb-8 px-2 mt-2">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-8 bg-white text-black rounded-lg flex items-center justify-center shadow-sm"><i class="ph-fill ph-sword"></i></div>
                    <div><h2 class="text-sm font-bold tracking-tight text-white">Scorpion</h2></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-md hover:bg-[#212121] text-gray-400 hover:text-white transition-colors"><i class="ph ph-x text-lg"></i></button>
            </div>
            <nav class="space-y-1">
                <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-squares-four text-lg"></i> Dashboard</a>
                <a href="/leads" class="flex items-center gap-3 px-3 py-2.5 bg-[#212121] text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-user-plus text-lg"></i> Enquiries</a>
                <a href="/students" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-users-three text-lg"></i> Students</a>
            </nav>
        </div>
        <div class="p-4">
            <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors w-full"><i class="ph ph-sign-out text-lg"></i> Sign Out</button>
        </div>
    </aside>

    <main id="mainContent" class="flex-1 flex flex-col h-screen overflow-hidden relative w-full transition-all duration-300 bg-gray-50">
        
        <!-- NEW SCORPION ACADEMY HEADER -->
        <header class="bg-white border-b border-gray-100 h-14 flex items-center justify-between px-4 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" title="Toggle Sidebar" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 transition-colors focus:outline-none flex items-center justify-center">
                    <i class="ph ph-sidebar-simple text-xl"></i>
                </button>
                <h1 class="text-lg font-bold text-gray-900 tracking-tight">Scorpion Academy <span class="text-gray-400 font-normal">/ Enquiries</span></h1>
            </div>
            <button onclick="toggleModal('leadModal')" class="bg-black text-white px-4 py-2 rounded-lg font-medium hover:bg-gray-800 transition-all shadow-sm flex items-center gap-2 text-sm"><i class="ph-bold ph-plus"></i> Add Lead</button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-5xl mx-auto space-y-4">
                
                <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-white p-4 rounded-2xl border border-gray-200 shadow-sm">
                    <div class="relative w-full sm:w-72">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchLeads" onkeyup="filterTable('leadsList', 'searchLeads')" placeholder="Search names or numbers..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-black outline-none transition-all">
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                    <th class="px-6 py-4">Prospect Details</th>
                                    <th class="px-6 py-4">Program</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Connect</th>
                                </tr>
                            </thead>
                            <tbody id="leadsList" class="divide-y divide-gray-100 text-sm">
                                <!-- Rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- LEAD MODAL -->
    <div id="leadModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-900">New Enquiry</h2>
                <button onclick="toggleModal('leadModal')" class="p-2 text-gray-400 hover:bg-gray-100 rounded-lg transition"><i class="ph-bold ph-x"></i></button>
            </div>
            <form id="addLeadForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Full Name</label>
                    <input type="text" id="name" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Phone Number</label>
                    <input type="text" id="phone" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Program</label>
                    <select id="program" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none">
                        <option value="Karate">Karate</option>
                        <option value="Silambam">Silambam</option>
                        <option value="Yoga">Yoga</option>
                        <option value="Other">Other / TBD</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-black text-white p-3 rounded-xl font-medium hover:bg-gray-800 transition-all mt-2 shadow-sm">Save Lead</button>
            </form>
        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
    <script>
        async function fetchLeads() {
            const res = await fetch('/api/leads', { headers: { 'Authorization': localStorage.getItem('token') } });
            if(res.status === 401) { logout(); return; }
            const leads = await res.json();
            
            document.getElementById('leadsList').innerHTML = leads.map(l => {
                let color = 'bg-gray-100 text-gray-600';
                if(l.status === 'Trial Booked') color = 'bg-blue-50 text-blue-600';
                if(l.status === 'Follow Up') color = 'bg-amber-50 text-amber-600';

                return `
                <tr class="hover:bg-gray-50 transition-colors group">
                    <td class="px-6 py-4 flex items-center gap-4">
                        <div class="h-8 w-8 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-600 text-xs">${l.name.charAt(0)}</div>
                        <div>
                            <div class="font-semibold text-gray-900">${l.name}</div>
                            <div class="text-gray-500 text-xs mt-0.5">${l.phone}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4 font-medium text-gray-700">${l.program}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus(this, ${l.id})" class="px-2 py-1 rounded-md text-[11px] font-semibold uppercase tracking-wide cursor-pointer border-none outline-none ${color} appearance-none">
                            <option ${l.status === 'New' ? 'selected' : ''}>New</option>
                            <option ${l.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                            <option ${l.status === 'Trial Booked' ? 'selected' : ''}>Trial Booked</option>
                            <option ${l.status === 'Follow Up' ? 'selected' : ''}>Follow Up</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <a href="https://wa.me/${l.phone}" target="_blank" class="p-2 inline-flex items-center justify-center rounded-lg text-gray-400 hover:bg-[#25D366] hover:text-white transition-all"><i class="ph-fill ph-whatsapp-logo text-lg"></i></a>
                    </td>
                </tr>
            `}).join('');
            
            applyStaggeredAnimations('#leadsList tr');
        }

        async function updateStatus(selectElement, leadId) {
            const newStatus = selectElement.value;
            await fetch(`/api/leads/${leadId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': localStorage.getItem('token') },
                body: JSON.stringify({ status: newStatus })
            });
            showToast("Status permanently updated in database!");
        }

        // THE MISSING FUNCTION: Submitting the Add Lead Form
        document.getElementById('addLeadForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': localStorage.getItem('token') },
                body: JSON.stringify({ 
                    name: document.getElementById('name').value, 
                    phone: document.getElementById('phone').value, 
                    program: document.getElementById('program').value 
                })
            });
            toggleModal('leadModal');
            showToast("New enquiry added successfully!");
            fetchLeads();
            e.target.reset();
        };

        fetchLeads();
    </script>
</body>
</html>
