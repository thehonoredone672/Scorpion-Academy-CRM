<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Scorpion CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-white text-gray-900 flex h-screen overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-20 hidden transition-opacity duration-300 opacity-0 md:hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-[260px] bg-[#171717] text-gray-300 flex flex-col justify-between transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="p-4">
            <div class="flex items-center justify-between mb-8 px-2 mt-2">
                <div class="flex items-center gap-3"><div class="h-8 w-8 bg-white text-black rounded-lg flex items-center justify-center shadow-sm"><i class="ph-fill ph-sword"></i></div><div><h2 class="text-sm font-bold tracking-tight text-white">Scorpion</h2><p id="bName" class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest truncate w-32">Branch</p></div></div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-md hover:bg-[#212121] text-gray-400 hover:text-white transition-colors"><i class="ph ph-x text-lg"></i></button>
            </div>
            <nav class="space-y-1">
                <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 bg-[#212121] text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-squares-four text-lg"></i> Dashboard</a>
                <a href="/leads" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-user-plus text-lg"></i> Enquiries</a>
                <a href="/students" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-users-three text-lg"></i> Students</a>
            </nav>
        </div>
        <div class="p-4"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors w-full"><i class="ph ph-sign-out text-lg"></i> Sign Out</button></div>
    </aside>

    <main id="mainContent" class="flex-1 flex flex-col h-screen overflow-hidden relative w-full transition-all duration-300 bg-gray-50">
        <!-- Header with Quick Actions -->
        <header class="bg-white border-b border-gray-100 h-14 flex items-center justify-between px-4 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 transition-colors focus:outline-none flex items-center justify-center"><i class="ph ph-sidebar-simple text-xl"></i></button>
                <h1 class="text-lg font-bold text-gray-900 tracking-tight">Scorpion Academy <span class="text-gray-400 font-normal">/ Overview</span></h1>
            </div>
            <!-- ... Keep the rest of your header buttons exactly the same ... -->
            <div class="flex items-center gap-3">
                <span class="hidden md:flex text-xs font-medium text-gray-500 items-center gap-2 pr-4 border-r border-gray-200"><i class="ph ph-calendar-blank text-base"></i> <span id="dateDisplay"></span></span>
                <!-- Quick Actions explicitly call their exact Modals -->
                <button onclick="toggleModal('leadModal')" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg font-medium hover:bg-gray-200 transition-colors text-xs flex items-center gap-1.5"><i class="ph-bold ph-user-plus"></i> Lead</button>
                <button onclick="toggleModal('studentModal')" class="bg-black text-white px-3 py-1.5 rounded-lg font-medium hover:bg-gray-800 transition-colors text-xs flex items-center gap-1.5"><i class="ph-bold ph-plus"></i> Student</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-5xl mx-auto space-y-6">
                
                <!-- NEW GRID: 4 Coaching Metrics -->
                <div id="dashboardCards" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                    <!-- Present Today -->
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-32">
                        <div class="flex justify-between items-start"><p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Present Today</p><i class="ph-fill ph-check-circle text-xl text-green-500"></i></div>
                        <div><h3 id="presentStudents" class="text-3xl font-bold tracking-tight text-gray-900">0</h3><p class="text-xs text-gray-400 font-medium mt-1">out of <span id="totalDisplay">0</span></p></div>
                    </div>
                    <!-- Absent Today -->
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-32">
                        <div class="flex justify-between items-start"><p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Absent Today</p><i class="ph-fill ph-x-circle text-xl text-red-400"></i></div>
                        <h3 id="absentStudents" class="text-3xl font-bold tracking-tight text-gray-900">0</h3>
                    </div>
                    <!-- Fees Collected -->
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-32">
                        <div class="flex justify-between items-start"><p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Fees Collected</p><i class="ph-fill ph-bank text-xl text-gray-400"></i></div>
                        <h3 id="feesPaid" class="text-3xl font-bold tracking-tight text-gray-900">$0</h3>
                    </div>
                    <!-- Fees Pending -->
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-32">
                        <div class="flex justify-between items-start"><p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Fees Pending</p><i class="ph-fill ph-warning-circle text-xl text-amber-500"></i></div>
                        <h3 id="feesPending" class="text-3xl font-bold tracking-tight text-amber-600">$0</h3>
                    </div>
                </div>

                <!-- NEW: Present/Absent Chart -->
                <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-bold text-gray-800">Attendance Trends (This Week)</h2>
                    </div>
                    <div class="h-64 w-full">
                        <canvas id="attendanceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Embedded Student Modal for Quick Action -->
    <div id="studentModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-900">Register Student</h2>
                <button onclick="toggleModal('studentModal')" class="p-2 text-gray-400 hover:bg-gray-100 rounded-lg transition"><i class="ph-bold ph-x"></i></button>
            </div>
            <form id="dashStudentForm" class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Full Name</label><input type="text" id="sName" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Rank</label>
                        <select id="sRank" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none"><option>White</option><option>Yellow</option><option>Orange</option><option>Green</option><option>Blue</option><option>Brown</option><option>Black</option></select>
                    </div>
                    <div><label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Phone</label><input type="text" id="sPhone" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required></div>
                </div>
                <button type="submit" class="w-full bg-black text-white p-3 rounded-xl font-medium hover:bg-gray-800 transition-all mt-2 shadow-sm">Save Student</button>
            </form>
        </div>
    </div>

    <!-- Embedded Lead Modal for Quick Action -->
    <div id="leadModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-900">New Enquiry</h2>
                <button onclick="toggleModal('leadModal')" class="p-2 text-gray-400 hover:bg-gray-100 rounded-lg transition"><i class="ph-bold ph-x"></i></button>
            </div>
            <form id="dashLeadForm" class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Full Name</label><input type="text" id="lName" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Phone Number</label><input type="text" id="lPhone" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none" required></div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Program</label>
                    <select id="lProgram" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-black outline-none"><option>Karate</option><option>Silambam</option><option>Yoga</option></select>
                </div>
                <button type="submit" class="w-full bg-black text-white p-3 rounded-xl font-medium hover:bg-gray-800 transition-all mt-2 shadow-sm">Save Lead</button>
            </form>
        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
    <script>
        async function loadStats() {
            const token = localStorage.getItem('token');
            if(!token) location.href = '/';
            try {
                const res = await fetch('/api/stats', { headers: {'Authorization': token} });
                if(res.status === 401) throw new Error('Unauthorized');
                const data = await res.json();
                
                const total = data.totalStudents || 0;
                
                // Simulated Calculations for Dashboard UI (To be replaced by real DB fields later)
                const present = Math.floor(total * 0.85); // 85% attendance
                const absent = total - present;
                const feePaid = total * 150; // $150 per student average
                const feePending = Math.floor(total * 0.15) * 150; // 15% haven't paid

                document.getElementById('totalDisplay').innerText = total;
                document.getElementById('presentStudents').innerText = present;
                document.getElementById('absentStudents').innerText = absent;
                document.getElementById('feesPaid').innerText = '₹' + feePaid.toLocaleString();
                document.getElementById('feesPending').innerText = '₹' + feePending.toLocaleString();
                
                applyStaggeredAnimations('#dashboardCards > div');
                renderAttendanceChart(total);

            } catch (err) { logout(); }
        }

        function renderAttendanceChart(total) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'],
                    datasets: [
                        { label: 'Present', data: [total-2, total-5, total-1, total-4, Math.floor(total * 0.85)], backgroundColor: '#111827', borderRadius: 4 },
                        { label: 'Absent', data: [2, 5, 1, 4, total - Math.floor(total * 0.85)], backgroundColor: '#fca5a5', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true, border: {display: false} } }, plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 12, usePointStyle: true } } } }
            });
        }

        // Quick Action Form Handlers
        document.getElementById('dashStudentForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/students', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem('token')}, body: JSON.stringify({ name: document.getElementById('sName').value, beltRank: document.getElementById('sRank').value, phone: document.getElementById('sPhone').value }) });
            toggleModal('studentModal'); showToast("Student registered successfully!"); loadStats(); e.target.reset();
        };

        document.getElementById('dashLeadForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/leads', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem('token')}, body: JSON.stringify({ name: document.getElementById('lName').value, phone: document.getElementById('lPhone').value, program: document.getElementById('lProgram').value }) });
            toggleModal('leadModal'); showToast("Lead added successfully!"); loadStats(); e.target.reset();
        };

        loadStats();
    </script>
</body>
</html>
