<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Scorpion CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-white text-gray-900 flex h-screen overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-20 hidden transition-opacity duration-300 opacity-0 md:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-[260px] bg-[#171717] text-gray-300 flex flex-col justify-between transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="p-4">
            <div class="flex items-center justify-between mb-8 px-2 mt-2">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-8 bg-white text-black rounded-lg flex items-center justify-center shadow-sm"><i class="ph-fill ph-sword"></i></div>
                    <div>
                        <h2 class="text-sm font-bold tracking-tight text-white">Scorpion</h2>
                        <p id="bName" class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest truncate w-32">Branch</p>
                    </div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-md hover:bg-[#212121] text-gray-400 hover:text-white transition-colors"><i class="ph ph-x text-lg"></i></button>
            </div>
            
            <nav class="space-y-1">
                <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 bg-[#212121] text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-squares-four text-lg"></i> Dashboard</a>
                <a href="/leads" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-user-plus text-lg"></i> Enquiries</a>
                <a href="/students" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors"><i class="ph ph-users-three text-lg"></i> Students</a>
            </nav>
        </div>
        <div class="p-4">
            <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#212121] text-gray-300 hover:text-white rounded-lg font-medium text-sm transition-colors w-full"><i class="ph ph-sign-out text-lg"></i> Sign Out</button>
        </div>
    </aside>

    <main id="mainContent" class="flex-1 flex flex-col h-screen overflow-hidden relative w-full transition-all duration-300 bg-gray-50">
        
        <!-- THE NEW CHATGPT-STYLE NAVBAR -->
        <header class="bg-white border-b border-gray-100 h-14 flex items-center justify-between px-4 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" title="Toggle Sidebar" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 transition-colors focus:outline-none flex items-center justify-center">
                    <i class="ph ph-sidebar-simple text-xl"></i>
                </button>
                <h1 class="text-lg font-semibold text-gray-800">Overview</h1>
            </div>
            <div class="hidden md:flex text-xs font-medium text-gray-500 items-center gap-2 pr-2">
                <i class="ph ph-calendar-blank text-base"></i> <span id="dateDisplay"></span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6" id="dashboardCards">
                <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-40 group transition-all duration-300">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Active Students</p>
                        <div class="text-gray-400 group-hover:text-black transition-colors"><i class="ph-fill ph-users-three text-2xl"></i></div>
                    </div>
                    <h3 id="totalStudents" class="text-4xl font-bold tracking-tight">0</h3>
                </div>
                
                <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-40 group transition-all duration-300">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">New Enquiries</p>
                        <div class="text-gray-400 group-hover:text-black transition-colors"><i class="ph-fill ph-user-plus text-2xl"></i></div>
                    </div>
                    <h3 id="activeLeads" class="text-4xl font-bold tracking-tight">0</h3>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between h-40 group transition-all duration-300">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Pending Fees</p>
                        <div class="text-gray-400 group-hover:text-red-500 transition-colors"><i class="ph-fill ph-wallet text-2xl"></i></div>
                    </div>
                    <h3 id="pendingFees" class="text-4xl font-bold tracking-tight text-gray-400 group-hover:text-red-500 transition-colors">0</h3>
                </div>
            </div>
        </div>
    </main>

    <script src="{% static 'js/script.js' %}"></script>
    <script>
        async function loadStats() {
            const token = localStorage.getItem('token');
            if(!token) location.href = '/';
            try {
                const res = await fetch('/api/stats', { headers: {'Authorization': token} });
                if(res.status === 401) throw new Error('Unauthorized');
                const data = await res.json();
                document.getElementById('totalStudents').innerText = data.totalStudents;
                document.getElementById('activeLeads').innerText = data.activeLeads;
                document.getElementById('pendingFees').innerText = data.pendingFees;
            } catch (err) { logout(); }
        }
        loadStats();
    </script>
</body>
</html>
