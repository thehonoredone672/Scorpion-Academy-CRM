<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scorpion Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-[#171717] text-white flex h-screen items-center justify-center p-4">

    <div class="bg-[#212121] p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-800 animate-stagger">
        <div class="flex flex-col items-center mb-8">
            <div class="h-12 w-12 bg-white text-black rounded-xl flex items-center justify-center shadow-sm mb-4">
                <i class="ph-fill ph-sword text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold tracking-tight text-white">Scorpion Academy</h2>
            <p class="text-xs text-gray-400 font-medium mt-1 uppercase tracking-widest">Portal Login</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase">Branch / Username</label>
                <div class="relative">
                    <i class="ph-fill ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="slug" class="w-full pl-10 pr-4 py-3 bg-[#171717] rounded-xl border border-gray-700 text-sm focus:ring-2 focus:ring-white outline-none transition-all text-white placeholder-gray-600" placeholder="coimbatore-main" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase">Password</label>
                <div class="relative">
                    <i class="ph-fill ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 bg-[#171717] rounded-xl border border-gray-700 text-sm focus:ring-2 focus:ring-white outline-none transition-all text-white placeholder-gray-600" placeholder="••••••••" required>
                </div>
            </div>
            
            <div id="errorMsg" class="hidden text-red-400 text-xs font-medium text-center bg-red-900/20 py-2 rounded-lg border border-red-900/50"></div>

            <button type="submit" class="w-full bg-white text-black p-3 rounded-xl font-bold hover:bg-gray-200 transition-all mt-6 shadow-sm flex items-center justify-center gap-2">
                Secure Login <i class="ph-bold ph-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if(localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.add('hidden');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    slug: document.getElementById('slug').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await res.json();

            if (res.ok) {
                // THE FIX: We must save the role into the browser storage!
                localStorage.setItem('token', data.token);
                localStorage.setItem('branchName', data.branchName);
                localStorage.setItem('role', data.role); 
                
                window.location.href = '/dashboard';
            } else {
                errorMsg.innerText = data.error || 'Invalid credentials';
                errorMsg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
