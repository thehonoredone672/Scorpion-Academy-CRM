<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scorpion CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <!-- Same form as before -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10 border border-gray-100">
        <div class="text-center mb-10">
            <div class="h-14 w-14 bg-black text-white rounded-2xl mx-auto flex items-center justify-center text-3xl shadow-xl shadow-gray-200 mb-6">
                <i class="ph-fill ph-sword"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Scorpion Academy</h1>
            <p class="text-sm font-medium text-gray-500 mt-2 uppercase tracking-widest">Dojo Management</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">Branch ID</label>
                <div class="relative">
                    <i class="ph ph-buildings absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="slug" class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all font-medium" placeholder="e.g. coimbatore-main" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">Password</label>
                <div class="relative">
                    <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" id="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all font-medium" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-black text-white font-bold py-4 px-4 rounded-xl hover:bg-gray-800 transition-all shadow-lg flex justify-center items-center gap-2">
                Access System <i class="ph-bold ph-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Authenticating...';
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ slug: document.getElementById('slug').value, password: document.getElementById('password').value })
            });
            const data = await res.json();
            
            if(data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('branchName', data.branchName);
                location.href = '/dashboard'; // <-- Updated Clean URL
            } else { 
                alert(data.error || 'Login failed'); 
                btn.innerHTML = 'Access System <i class="ph-bold ph-arrow-right"></i>';
            }
        };
    </script>
</body>
</html>
